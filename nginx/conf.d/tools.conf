# upstream definitions
upstream portainer_upstream {
  server portainer:9000;
}

upstream dozzle_upstream {
  server dozzle:8080;
}

server {
  listen 443 ssl;
  server_name victron-tools.local;

  ssl_certificate /etc/nginx/ssl/tools.crt;
  ssl_certificate_key /etc/nginx/ssl/tools.key;

  # Portainer
  location /portainer/ {
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://portainer_upstream/;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header Authorization "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Dozzle
  location /dozzle/ {
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://dozzle_upstream/;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header Authorization "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
