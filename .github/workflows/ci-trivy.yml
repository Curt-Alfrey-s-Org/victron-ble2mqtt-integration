name: CI — tests & trivy

on:
  push:
    branches: [ main, '**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests (with Mosquitto)
    runs-on: ubuntu-latest
    services:
      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
        options: >-
          --health-cmd="/usr/bin/nc -z localhost 1883 || exit 1"
          --health-interval=5s --health-timeout=2s --health-retries=12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Mosquitto
        run: |
          for i in {1..20}; do
            nc -z localhost 1883 && echo "mosquitto up" && break
            echo "waiting for mosquitto ($i)"; sleep 2
          done

      - name: Run tests
        env:
          MQTT_HOST: localhost
        run: pytest -q

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@v1
        with:
          scan-type: fs
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
