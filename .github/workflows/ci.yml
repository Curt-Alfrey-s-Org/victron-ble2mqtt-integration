name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: |
          pytest -q

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: victron_ble2mqtt:ci

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasec/trivy-action@v2
        with:
          image-ref: victron_ble2mqtt:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  integration:
    needs: [test, build-image]
    runs-on: ubuntu-latest
    services:
      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest paho-mqtt

      - name: Run integration tests
        env:
          MQTT_HOST: localhost
        run: |
          pytest -q tests/test_integration_mqtt.py
      - name: Build and run container publish check
        run: |
          docker build -t victron_ble2mqtt:ci .
          # Start a subscriber in the background that writes the payload to /tmp/ci_mqtt_received.txt
          python3 scripts/ci_subscriber.py &
          SUB_PID=$!
          # Run the container with host network so it can reach the Mosquitto service on localhost
          docker run --rm --network host -v ${{ github.workspace }}:/work victron_ble2mqtt:ci python /work/scripts/container_test_publish.py
          # Wait for subscriber to write the file
          for i in 1 2 3 4 5; do
            if [ -f /tmp/ci_mqtt_received.txt ]; then break; fi
            sleep 1
          done
          if [ ! -f /tmp/ci_mqtt_received.txt ]; then echo "No payload file"; exit 1; fi
          cat /tmp/ci_mqtt_received.txt
          kill $SUB_PID || true

  publish:
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
