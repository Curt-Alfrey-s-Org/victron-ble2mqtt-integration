## Docker Compose v2 format (no top-level 'version' field)
services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    # Allow HA to see services running on the host (mosquitto at localhost)
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - ./ha-discovery.env
    environment:
      # Override via `.env` on host before `docker compose` or set in ha-discovery.env
      - TZ=${TZ:-America/Chicago}
    volumes:
      - /opt/homeassistant:/config
      - /run/dbus:/run/dbus:ro
    # Optional serial device mapping — uncomment and set the correct host path if needed.
    # devices:
    #   - /dev/serial/by-id/usb-serial-if-needed:/dev/serial/by-id/usb-serial-if-needed
    mem_limit: 1g
    cpus: 0.7
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8123/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# Notes:
# - Maps live config at /opt/homeassistant
# - network_mode: host — do not add ports: (ignored / warns with Compose)
# - If you recreate the container, stop/remove the old one first to avoid name conflicts
