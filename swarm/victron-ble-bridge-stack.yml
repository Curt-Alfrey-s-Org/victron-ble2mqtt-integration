version: "3.8"

services:
  victron_ble_bridge:
    image: localhost:5000/victron-ble2mqtt:1
    env_file:
      - ha-discovery.env        # MQTT_HOST / MQTT_PORT / MQTT_USER / MQTT_PASSWORD
      - auto-discovery.env      # TOPIC_ROOT (topic base)
      - victron-secrets.env     # ADVKEY_* (advertisement keys)
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app/override:/work:/app"  # prefer /work (generated config) then repo code
    volumes:
      # Your repo (read-only) so we can import the module and read user_settings.example.py
      - /home/n4s1/victron-ble2mqtt-integration:/app:ro
      # Writable workspace for generated config & runtime cache
      - victron_work:/work
      # Access host D-Bus for BlueZ (bluetoothd). We talk to host's adapter via DBus.
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/dbus/system_bus_socket || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 0
      placement:
        constraints:
          - node.role == manager

networks:
  default:
    driver: overlay

volumes:
  victron_work:
