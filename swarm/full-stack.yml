version: "3.8"

services:
  # -----------------------------
  # Observability UI (Dozzle)
  # -----------------------------
  dozzle:
    image: amir20/dozzle:latest
    env_file:
      - swarm/.env                     # DOZZLE_USERNAME / DOZZLE_PASSWORD (optional)
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_TAILSIZE: "1000"
      DOZZLE_ADDR: ":8080"
      # If you want basic auth, set these in swarm/.env or uncomment:
      # DOZZLE_USERNAME: admin
      # DOZZLE_PASSWORD: supersecret
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  # Tail host log files to stdout so they appear in Dozzle
  file_victron:
    image: busybox:1.36
    command: ["sh","-c","tail -n +1 -F /logs/victron_ble2mqtt.log"]
    volumes:
      - /var/log:/logs:ro
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

  file_wifi_ap:
    image: busybox:1.36
    command: ["sh","-c","tail -n +1 -F /logs/wifi_ap_watchdog.log"]
    volumes:
      - /var/log:/logs:ro
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

  file_mosquitto:
    image: busybox:1.36
    command: ["sh","-c","tail -n +1 -F /logs/mosquitto/mosquitto.log"]
    volumes:
      - /var/log:/logs:ro
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

  # -----------------------------
  # Victron BLE -> MQTT bridge
  # -----------------------------
  victron_ble_bridge:
    image: python:3.11-slim
    env_file:
      - swarm/ha-discovery.env         # MQTT_HOST / MQTT_PORT / MQTT_USER / MQTT_PASSWORD
      - swarm/auto-discovery.env       # TOPIC_ROOT
      - swarm/victron-secrets.env      # ADVKEY_* from your snapshot
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app/override:/work:/app"   # prefer /work (generated config) then repo code
    volumes:
      - /home/n4s1/victron-ble2mqtt-integration:/app:ro
      - victron_work:/work
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    command:
      - sh
      - -c
      - |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive

        # OS prerequisites for BlueZ client
        apt-get update
        apt-get install -y --no-install-recommends bluez libglib2.0-0 dbus libbluetooth3
        rm -rf /var/lib/apt/lists/*

        # Build user_settings.py from repo example + envs (incl. ADVKEY_* overrides)
        python - <<'PY'
