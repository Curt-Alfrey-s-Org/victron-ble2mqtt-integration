# full-stack.yml  (Swarm stack: victron_support)
# - Dozzle on :9999
# - Victron BLE (uses your prebuilt image)
# - Optional MQTT health publishers + HA discovery helpers

services:
  # -----------------------------
  # Victron BLE2MQTT
  # -----------------------------
  victron_ble2mqtt:
    image: local/victron-ble-bridge:1.0
    env_file:
      - health.env
      - ha-discovery.env
      - auto-discovery.env
      - victron-secrets.env
    volumes:
      - /var/log:/logs:ro
      - /home/n4s1/victron-ble2mqtt-integration/swarm/scripts:/opt/victron:ro
    deploy:
      mode: replicated
      replicas: 1
      restart_policy: { condition: any, delay: 5s }

  # -----------------------------
  # Mosquitto MQTT Broker
  # -----------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - /home/n4s1/victron-ble2mqtt-integration/swarm/mosquitto:/mosquitto/config
      - /home/n4s1/victron-ble2mqtt-integration/swarm/mosquitto/data:/mosquitto/data
      - /home/n4s1/victron-ble2mqtt-integration/swarm/mosquitto/log:/mosquitto/log
    deploy:
      mode: replicated
      replicas: 1
      restart_policy: { condition: any, delay: 5s }

  # -----------------------------
  # Dozzle (Container Logs UI)
  # -----------------------------
  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_USERNAME=admin
      - DOZZLE_PASSWORD=changeme
    deploy:
      mode: replicated
      replicas: 1
      restart_policy: { condition: any, delay: 5s }

  # -----------------------------

  # -----------------------------
  # Victron BLE -> MQTT
  # -----------------------------
  mqtt_health_wifi:
    image: localhost:5000/mqtt-tools:1
    volumes:
      - /var/log:/logs:ro
      - /home/n4s1/victron-ble2mqtt-integration/swarm/scripts:/opt/victron:ro
    env_file:
      - health.env
    command: ["sh","-c","/opt/victron/mqtt_health_wifi.sh"]
    deploy:
      mode: replicated
      replicas: 1
      restart_policy: { condition: any, delay: 5s }

  # -----------------------------
  # Home Assistant discovery (static health cards)
  # -----------------------------
  ha_discovery:
    image: localhost:5000/mqtt-tools:1
    env_file:
      - ha-discovery.env
    command: ["sh","-c","/opt/victron/ha_discovery.sh"]
    deploy:
      mode: replicated
      replicas: 1
      restart_policy: { condition: any, delay: 5s }

  # -----------------------------
  # HA discovery (curated whitelist) — enabled
  # -----------------------------
  ha_curated_discovery:
    volumes:
      - /home/n4s1/victron-ble2mqtt-integration/swarm/scripts:/opt/victron:ro
    image: localhost:5000/mqtt-tools:1
    env_file:
      - ha-discovery.env
      - auto-discovery.env
    command: ["sh","-c","/opt/victron/ha_curated_discovery.sh"]
    deploy:
      mode: replicated
      replicas: 1
      restart_policy: { condition: any, delay: 5s }

  # -----------------------------
  # HA discovery (auto) — keep OFF by default to avoid dupes
  # -----------------------------
  ha_auto_discovery:
    image: localhost:5000/mqtt-tools:1
    env_file:
      - ha-discovery.env
      - auto-discovery.env
    command: ["sh","-c","/opt/victron/ha_auto_discovery.sh"]
    deploy:
      mode: replicated
      replicas: 0
      restart_policy: { condition: any, delay: 5s }

    volumes:
      - /home/n4s1/victron-ble2mqtt-integration/swarm/scripts:/opt/victron:ro
  # -----------------------------
  # MQTT test publishers — disabled
  # -----------------------------
  mqtt_test_discovery_once:
    image: localhost:5000/mqtt-tools:1
    env_file:
      - ha-discovery.env
    command: ["sh","-c","/opt/victron/mqtt_test_discovery_once.sh"]
    deploy:
      mode: replicated
      replicas: 0
      restart_policy: { condition: none }

  mqtt_test_ping_once:
    image: localhost:5000/mqtt-tools:1
    env_file:
      - ha-discovery.env
    command: ["sh","-c","/opt/victron/mqtt_test_ping_once.sh"]
    deploy:
      mode: replicated
      replicas: 0
      restart_policy: { condition: none }

    volumes:
      - /home/n4s1/victron-ble2mqtt-integration/swarm/scripts:/opt/victron:ro
networks:
  default:
    driver: overlay

volumes:
  victron_work:
