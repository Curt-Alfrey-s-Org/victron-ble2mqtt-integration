version: "3.8"

services:
  # Logs containers that restart frequently (so you can catch silent crash loops)
  docker_flapwatch:
    image: docker:27-cli
    environment:
      THRESHOLD_RESTARTS: "3"   # N restarts
      WINDOW_SEC: "300"         # within this many seconds
      POLL_SEC: "30"            # how often to re-check
    command:
      - sh
      - -c
      - |
        set -eu
        THRESHOLD="${THRESHOLD_RESTARTS:-3}"
        WINDOW="${WINDOW_SEC:-300}"
        POLL="${POLL_SEC:-30}"
        echo "[flapwatch] threshold=${THRESHOLD} window=${WINDOW}s poll=${POLL}s"
        while true; do
          since="$(date -u -d "@$(( $(date +%s) - WINDOW ))" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -r $(( $(date +%s) - WINDOW )) +%Y-%m-%dT%H:%M:%SZ)"
          for id in $(docker ps -q); do
            name="$(docker inspect -f '{{.Name}}' "$id" | sed 's#^/##')"
            restarts="$(docker inspect -f '{{.RestartCount}}' "$id" 2>/dev/null || echo 0)"
            cnt="$(docker events --since "$since" --until "0s" --filter "container=$id" --filter "event=die" --format '{{.Time}}' | wc -l | tr -d ' ')"
            if [ "${cnt:-0}" -ge "$THRESHOLD" ]; then
              echo "[FLAP] ${name} restarted ${cnt} times in last ${WINDOW}s (total=${restarts})"
            fi
          done
          sleep "$POLL"
        done
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      placement:
        constraints:
          - node.role == manager

  # Weekly auto-prune: removes unused images/containers/networks/volumes older than 30 days
  docker_auto_prune:
    image: docker:27-cli
    environment:
      SCHEDULE_SEC: "604800"    # 7 days
      PRUNE_UNTIL: "720h"       # 30 days
    command:
      - sh
      - -c
      - |
        set -eu
        SLEEP="${SCHEDULE_SEC:-86400}"
        UNTIL="${PRUNE_UNTIL:-720h}"
        echo "[auto-prune] every ${SLEEP}s; keeping artifacts newer than ${UNTIL}"
        while true; do
          echo "[auto-prune] docker system prune --force --volumes --filter until=${UNTIL}"
          docker system prune --force --volumes --filter "until=${UNTIL}" || true
          echo "[auto-prune] done; sleeping ${SLEEP}s"
          sleep "${SLEEP}"
        done
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      placement:
        constraints:
          - node.role == manager

networks:
  default:
    driver: overlay
